<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Chat App</title>

<!-- Firebase (IMPORTANT: v8 for compatibility) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
#chat { width:90%; height:300px; overflow-y:auto; margin:10px auto; border:1px solid white; padding:10px; }
.msg { text-align:left; margin:5px; padding:5px; background:#222; border-radius:5px; }
input { padding:10px; margin:5px; }
button { padding:10px; cursor:pointer; }
</style>
</head>

<body>

<h2>🔥 4 User Chat Test</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="email"><br>
  <input id="pass" type="password" placeholder="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h3>Welcome <span id="user"></span></h3>

  <div id="chat"></div>

  <input id="msg" placeholder="message">
  <button onclick="sendMsg()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG (paste yours here)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = "";

// 🔑 LOGIN
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(user => {
    currentUser = user.user.email.split("@")[0];

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").innerText = currentUser;

    loadChat();
  })
  .catch(err => alert(err.message));
}

// 💬 SEND MESSAGE
function sendMsg(){
  let text = document.getElementById("msg").value;
  if(text === "") return;

  db.ref("messages").push({
    user: currentUser,
    text: text,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// 📥 LOAD CHAT LIVE
function loadChat(){
  db.ref("messages").on("value", snap => {
    let data = snap.val();
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    for(let id in data){
      chat.innerHTML += `<div class="msg"><b>${data[id].user}:</b> ${data[id].text}</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
  });
}

// 🚪 LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}
</script>

</body>
</html>
