<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Chat App</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
#chatBox { height:300px; overflow-y:scroll; border:1px solid white; margin:10px auto; width:90%; padding:10px; }
.msg { text-align:left; margin:5px; padding:5px; background:#222; border-radius:5px; }
input { padding:10px; margin:5px; width:200px; }
button { padding:10px; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<h2>🔥 4 User Mini Chat</h2>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="email"><br>
  <input id="pass" type="password" placeholder="password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT APP -->
<div id="app" style="display:none;">

  <h3>Welcome <span id="user"></span></h3>

  <div id="chatBox"></div>

  <input id="msg" placeholder="type message">
  <button onclick="sendMsg()">Send</button>

  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<script>
// 🔥 YOUR FIREBASE CONFIG (your exact one)
const firebaseConfig = {
  apiKey: "AIzaSyDyOeFXB2FeD2KN6Q1gYLIo99nDdRYg8BI",
  authDomain: "test-chat-94f4d.firebaseapp.com",
  databaseURL: "https://test-chat-94f4d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "test-chat-94f4d",
  storageBucket: "test-chat-94f4d.firebasestorage.app",
  messagingSenderId: "357671042497",
  appId: "1:357671042497:web:b78efae849e477d5210340"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = "";

// 🔑 LOGIN
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(user => {
    currentUser = user.user.email.split("@")[0];

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").innerText = currentUser;

    loadChat();
  })
  .catch(err => alert(err.message));
}

// 💬 SEND MESSAGE
function sendMsg(){
  let text = document.getElementById("msg").value;
  if(text === "") return;

  db.ref("chats").push({
    user: currentUser,
    text: text,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// 📥 LOAD CHAT LIVE
function loadChat(){
  db.ref("chats").on("value", snap => {
    let data = snap.val();
    let box = document.getElementById("chatBox");
    box.innerHTML = "";

    for(let id in data){
      let m = data[id];
      box.innerHTML += `
        <div class="msg"><b>${m.user}:</b> ${m.text}</div>
      `;
    }

    box.scrollTop = box.scrollHeight;
  });
}

// 🚪 LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}
</script>

</body>
</html>
