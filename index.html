<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Story Game</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.game{
    width:90%;
    max-width:650px;
    text-align:center;
}

img{
    width:100%;
    border-radius:12px;
}

#text{
    font-size:22px;
    margin:20px 0;
}

button{
    width:100%;
    margin:8px 0;
    padding:15px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#2d89ef;
    color:white;
}

button:hover{
    background:#1b5fb5;
}
</style>
</head>

<body>

<div class="game">

<img id="image" src="images/start.jpg">

<div id="text"></div>

<div id="choices"></div>

</div>

<script>

const story = {

start:{
image:"images/start.jpg",
text:"WELLCOME TO FEMBOY CAFE",
choices:[
{text:"Enter Femboy cafe",next:"train"},
{text:"Go Home",next:"home"}
]
},

train:{
image:"images/train.jpg",
text:"FEMBOY CAFE",
choices:[
{text:"SIDHART",next:"match"},
{text:"ANMUL",next:"home"}
]
},

home:{
image:"images/home.jpg",
text:"YOU CUDDLE A WHILE ",
choices:[
{text:"Sleep",next:"bad"},
{text:"Go Back",next:"train"}
]
},

match:{
image:"images/match.jpg",
text:"you smashed here all day",
choices:[
{text:"Finish",next:"win"}
]
},

win:{
image:"images/win.jpg",
text:"LET HER REST",
choices:[
{text:"HAVE MERCY",next:"start"}
]
},

bad:{
image:"images/bad.jpg",
text:"ABHINAV SNATCH HER",
choices:[
{text:"Try Again",next:"start"}
]
}

};

function showScene(scene){

document.getElementById("image").src=story[scene].image;

document.getElementById("text").innerHTML=story[scene].text;

const area=document.getElementById("choices");

area.innerHTML="";

story[scene].choices.forEach(choice=>{

const btn=document.createElement("button");

btn.innerText=choice.text;

btn.onclick=()=>showScene(choice.next);

area.appendChild(btn);

});

}

showScene("start");

</script>

</body>
</html>
